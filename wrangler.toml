name = "elemental-pro-spa"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# The Cloudflare adapter auto-wires Astro's Session API to a KV binding
# named "SESSION". This project does not use Astro.session, so the binding
# is not required — the adapter's log message about it can be ignored.
# Uncomment and create the namespace only if session support is needed later:
# [[kv_namespaces]]
# binding = "SESSION"
# id = "REPLACE_WITH_KV_NAMESPACE_ID"
